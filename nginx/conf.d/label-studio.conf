# ============================================================
# Label Studio — Nginx vhost
# Receives connections from Cloudflare Tunnel (HTTP, no TLS here).
# CF handles TLS termination at the edge.
# ============================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
    listen 80;
    http2 on;
    server_name _;

    # Re-resolve Docker service DNS to avoid stale upstream IP after container recreate.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # CF Tunnel health probe
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Label Studio — main app + WebSocket (annotations, real-time)
    location / {
        set $label_studio_upstream label-studio:8080;
        proxy_pass         http://$label_studio_upstream;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Forward real client info from CF Tunnel
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Cloudflare Tunnel connects to nginx over plain HTTP, so $scheme = "http".
        # Use mapped X-Forwarded-Proto to handle both localhost HTTP and CF Tunnel HTTPS
        proxy_set_header   X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Timeouts — Label Studio can be slow on first load / large exports
        proxy_read_timeout    300s;
        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;

        # Buffer tuning for large annotation payloads
        proxy_buffer_size          128k;
        proxy_buffers          8   256k;
        proxy_busy_buffers_size    512k;
    }
}
