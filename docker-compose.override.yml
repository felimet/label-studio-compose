# ============================================================
# Local Development Override
# Exposes ports directly; disables strict signup; enables CPU mode.
# This file is auto-loaded by `docker compose up` alongside docker-compose.yml.
# NOTE: keep `name:` only in base docker-compose.yml to avoid overlay conflicts.
# ============================================================

services:
  label-studio:
    ports:
      - "18086:8080"
    environment:
      - DJANGO_LOG_LEVEL=INFO
      - LOG_LEVEL=INFO
  batch-server:
    ports:
      - "18085:8085"

  minio:
    ports:
      - "19000:9000"   # API (S3 endpoint)
      - "19001:9001"   # MinIO Console UI
      - "19002:9002"   # Full Admin UI (firstfinger/minio only; not via Cloudflare Tunnel)

  redis:
    ports:
      - "16380:6379"   # Avoid conflict with local Redis

  nginx:
    ports:
      - "18090:80"
