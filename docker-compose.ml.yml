# ============================================================
# ML Backends Overlay — SAM3 Image + Video
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ml.yml up -d
#
# NOTE: No `name:` here — the base docker-compose.yml defines project name
# `label-studio` and owns the `internal` network. Adding `name:` in an
# overlay overrides the project name and breaks network sharing.
# ============================================================

services:

  # ── SAM3 Image Backend ──────────────────────────────────────
  sam3-image-backend:
    build:
      context: ./ml-backends/sam3-image
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_KEY=${LABEL_STUDIO_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - SAM3_MODEL_ID=${SAM3_IMAGE_MODEL_ID:-facebook/sam3.1}
      - SAM3_CHECKPOINT_FILENAME=${SAM3_IMAGE_CHECKPOINT_FILENAME:-sam3.1_multiplex.pt}
      - MODEL_DIR=/data/models
      - DEVICE=${DEVICE:-cuda}
      - PORT=9090
      # WORKERS: 1 per GPU recommended (each worker preloads the full model into VRAM).
      #   Raise to match GPU count for multi-GPU nodes (e.g. ML_WORKERS=2 for dual-GPU).
      - WORKERS=${ML_WORKERS:-1}
      # THREADS: threads share the same worker/model; raise freely on modern CPUs.
      #   Default 8 suits 8-core machines; set ML_THREADS=16 for 16+ core servers.
      - THREADS=${ML_THREADS:-8}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SAM3 PCS (text prompt) settings
      - SAM3_ENABLE_PCS=${SAM3_ENABLE_PCS:-true}
      - SAM3_CONFIDENCE_THRESHOLD=${SAM3_CONFIDENCE_THRESHOLD:-0.5}
      - SAM3_RETURN_ALL_MASKS=${SAM3_RETURN_ALL_MASKS:-false}
      # Optional basic auth for the ML backend API
      - BASIC_AUTH_USER=${ML_BASIC_AUTH_USER:-}
      - BASIC_AUTH_PASS=${ML_BASIC_AUTH_PASS:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
      - sam3-image-models:/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    depends_on:
      label-studio:
        condition: service_healthy
    networks:
      - internal

  # ── SAM3 Video Backend ──────────────────────────────────────
  sam3-video-backend:
    build:
      context: ./ml-backends/sam3-video
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_KEY=${LABEL_STUDIO_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - SAM3_MODEL_ID=${SAM3_VIDEO_MODEL_ID:-facebook/sam3.1}
      - SAM3_CHECKPOINT_FILENAME=${SAM3_VIDEO_CHECKPOINT_FILENAME:-sam3.1_multiplex.pt}
      - MODEL_DIR=/data/models
      - DEVICE=${DEVICE:-cuda}
      - MAX_FRAMES_TO_TRACK=${MAX_FRAMES_TO_TRACK:-10}
      - PORT=9090
      # WORKERS: 1 per GPU recommended (each worker preloads the full model into VRAM).
      #   Raise to match GPU count for multi-GPU nodes (e.g. ML_WORKERS=2 for dual-GPU).
      - WORKERS=${ML_WORKERS:-1}
      # THREADS: threads share the same worker/model; raise freely on modern CPUs.
      #   Default 8 suits 8-core machines; set ML_THREADS=16 for 16+ core servers.
      - THREADS=${ML_THREADS:-8}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SAM3 PCS (text prompt) + Flash Attention 3
      - SAM3_ENABLE_PCS=${SAM3_ENABLE_PCS:-true}
      # SAM3_ENABLE_FA3: requires ENABLE_FA3=true at build time AND flash-attn-3 installed
      - SAM3_ENABLE_FA3=${SAM3_ENABLE_FA3:-false}
      # Optional basic auth for the ML backend API
      - BASIC_AUTH_USER=${ML_BASIC_AUTH_USER:-}
      - BASIC_AUTH_PASS=${ML_BASIC_AUTH_PASS:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
      - sam3-video-models:/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    depends_on:
      label-studio:
        condition: service_healthy
    networks:
      - internal

volumes:
  hf-cache:
  sam3-image-models:
  sam3-video-models:
