# ============================================================
# ML Backends Overlay — SAM3 Image + Video + SAM2.1 Image + Video
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ml.yml up -d
#
# Environment:
#   cp .env.ml.example .env.ml  →  fill in values
#   env_file loads all user-configurable vars into the container.
#   environment: only sets static values (URL, paths, port).
#
# NOTE: No `name:` here — the base docker-compose.yml defines project name
# `label-anything-sam` and owns the `internal` network. Adding `name:` in an
# overlay overrides the project name and breaks network sharing.
# ============================================================

services:

  # ── SAM3 Image Backend ──────────────────────────────────────
  sam3-image-backend:
    build:
      context: ./ml-backends/sam3-image
      dockerfile: Dockerfile
      args:
        # sam3.1 → matches sam3.1_multiplex.pt / current HF checkpoints
        # main   → old architecture, incompatible with current checkpoints
        SAM3_COMMIT: main
    restart: unless-stopped
    env_file:
      - .env.ml
    environment:
      - LOG_LEVEL=INFO
      - LABEL_STUDIO_URL=http://label-studio:8080
      - PORT=9090
      # GPU assignment and worker count are derived from SAM3_IMAGE_GPU_INDEX /
      # SAM3_IMAGE_WORKERS (set in .env.ml) inside start.sh at container startup.
      # Docker Compose ${VAR} substitution reads from the HOST's .env, NOT from
      # env_file:, so those variables cannot be expanded here.
    volumes:
      - hf-cache:/home/appuser/.cache/huggingface
      - ./ml-backends/sam3-image/model.py:/app/model.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf $${BASIC_AUTH_USER:+-u $$BASIC_AUTH_USER:$$BASIC_AUTH_PASS} http://localhost:9090/health"]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    depends_on:
      label-studio:
        condition: service_healthy
    networks:
      - internal

  # ── SAM3 Video Backend ──────────────────────────────────────
  sam3-video-backend:
    build:
      context: ./ml-backends/sam3-video
      dockerfile: Dockerfile
      args:
        # sam3.1 → matches sam3.1_multiplex.pt / current HF checkpoints
        # main   → old architecture, incompatible with current checkpoints
        SAM3_COMMIT: main
        ENABLE_FA3: false
    restart: unless-stopped
    env_file:
      - .env.ml
    environment:
      - LOG_LEVEL=INFO
      - LABEL_STUDIO_URL=http://label-studio:8080
      - PORT=9090
      # GPU assignment and worker count are derived from SAM3_VIDEO_GPU_INDEX /
      # SAM3_VIDEO_WORKERS (set in .env.ml) inside start.sh at container startup.
      # Docker Compose ${VAR} substitution reads from the HOST's .env, NOT from
      # env_file:, so those variables cannot be expanded here.
    volumes:
      - hf-cache:/home/appuser/.cache/huggingface
      - ./ml-backends/sam3-video/model.py:/app/model.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf $${BASIC_AUTH_USER:+-u $$BASIC_AUTH_USER:$$BASIC_AUTH_PASS} http://localhost:9090/health"]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    depends_on:
      label-studio:
        condition: service_healthy
    networks:
      - internal

  # ── SAM2.1 Image Backend ────────────────────────────────────
  sam21-image-backend:
    build:
      context: ./ml-backends/sam21-image
      dockerfile: Dockerfile
      args:
        SAM2_COMMIT: main
        # Pass HF_TOKEN at build time to download checkpoints:
        #   docker compose build --build-arg HF_TOKEN=<token> sam21-image-backend
        # Or set HF_TOKEN in .env.ml (will be read by download_models.py)
    restart: unless-stopped
    env_file:
      - .env.ml
    environment:
      - LOG_LEVEL=INFO
      - LABEL_STUDIO_URL=http://label-studio:8080
      - PORT=9090
    volumes:
      - model-cache:/data/models
      - ./ml-backends/sam21-image/model.py:/app/model.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf $${BASIC_AUTH_USER:+-u $$BASIC_AUTH_USER:$$BASIC_AUTH_PASS} http://localhost:9090/health"]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    depends_on:
      label-studio:
        condition: service_healthy
    networks:
      - internal

  # ── SAM2.1 Video Backend ─────────────────────────────────────
  sam21-video-backend:
    build:
      context: ./ml-backends/sam21-video
      dockerfile: Dockerfile
      args:
        SAM2_COMMIT: main
    restart: unless-stopped
    env_file:
      - .env.ml
    environment:
      - LOG_LEVEL=INFO
      - LABEL_STUDIO_URL=http://label-studio:8080
      - PORT=9090
    volumes:
      - model-cache:/data/models
      - ./ml-backends/sam21-video/model.py:/app/model.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf $${BASIC_AUTH_USER:+-u $$BASIC_AUTH_USER:$$BASIC_AUTH_PASS} http://localhost:9090/health"]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    depends_on:
      label-studio:
        condition: service_healthy
    networks:
      - internal

volumes:
  hf-cache:
  # Shared checkpoint volume for SAM2.1 image + video backends.
  # Checkpoints are downloaded during `docker compose build` (download_models.py).
  # Both services mount this volume read-write; at runtime they only read .pt files.
  model-cache:
