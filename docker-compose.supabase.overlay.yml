# ============================================================
# Supabase Admin Overlay (Studio + Meta)
# MODE: Overlay only
# Pairing: docker-compose.supabase.overlay.yml + .env.supabase.overlay
# For standalone full stack, use: docker-compose.supabase.yml + .env.supabase
# Directly aligned to supabase/supabase/docker naming and env keys.
#
# Scope for this repository:
#   - supabase-studio: management UI (supabase/studio)
#   - supabase-meta: Postgres management REST API (+ Swagger docs)
#   - supabase-storage + supabase-imgproxy: optional S3-backed storage overlay
#     (profile: supabase-s3; adapted for MinIO)
#
# Notes:
#   - postgres-meta itself is API-only. It is NOT a dashboard UI.
#   - For security, expose studio/meta only behind trusted proxy
#     (Cloudflare Tunnel + CF Access) or loopback bind.
#   - Storage profile is disabled by default to avoid impacting the
#     current Studio/Meta admin lane.
# ============================================================

services:
  supabase-studio:
    image: supabase/studio:latest
    restart: unless-stopped
    environment:
      - HOSTNAME=0.0.0.0
      - STUDIO_PG_META_URL=http://supabase-meta:${SUPABASE_META_CONTAINER_PORT:-8080}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_HOST=${POSTGRES_HOST:-pg-db}
      - POSTGRES_DB=${POSTGRES_DB:-labelstudio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - PG_META_CRYPTO_KEY=${PG_META_CRYPTO_KEY:?PG_META_CRYPTO_KEY is required}
      - PGRST_DB_SCHEMAS=${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      - PGRST_DB_MAX_ROWS=${PGRST_DB_MAX_ROWS:-1000}
      - PGRST_DB_EXTRA_SEARCH_PATH=${PGRST_DB_EXTRA_SEARCH_PATH:-public}
      - DEFAULT_ORGANIZATION_NAME=${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}
      - DEFAULT_PROJECT_NAME=${STUDIO_DEFAULT_PROJECT:-Default Project}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-http://nginx:80}
      - SUPABASE_PUBLIC_URL=${SUPABASE_PUBLIC_URL:-http://localhost:18090}
      - SUPABASE_ANON_KEY=${ANON_KEY:-}
      - SUPABASE_SERVICE_KEY=${SERVICE_ROLE_KEY:-}
      - AUTH_JWT_SECRET=${JWT_SECRET:-}
      - LOGFLARE_API_KEY=${LOGFLARE_PUBLIC_ACCESS_TOKEN:-}
      - LOGFLARE_PUBLIC_ACCESS_TOKEN=${LOGFLARE_PUBLIC_ACCESS_TOKEN:-}
      - LOGFLARE_PRIVATE_ACCESS_TOKEN=${LOGFLARE_PRIVATE_ACCESS_TOKEN:-}
      - LOGFLARE_URL=${LOGFLARE_URL:-http://analytics:4000}
      - NEXT_PUBLIC_ENABLE_LOGS=${NEXT_PUBLIC_ENABLE_LOGS:-false}
      - NEXT_ANALYTICS_BACKEND_PROVIDER=${NEXT_ANALYTICS_BACKEND_PROVIDER:-postgres}
      - SNIPPETS_MANAGEMENT_FOLDER=/app/snippets
      - EDGE_FUNCTIONS_MANAGEMENT_FOLDER=/app/edge-functions
    ports:
      - "${SUPABASE_STUDIO_BIND_ADDRESS:-127.0.0.1}:${SUPABASE_STUDIO_PORT:-18091}:3000"
    depends_on:
      pg-db:
        condition: service_healthy
      supabase-meta:
        condition: service_started
    networks:
      - internal

  supabase-meta:
    image: supabase/postgres-meta:v0.96.3
    restart: unless-stopped
    environment:
      - PG_META_HOST=${SUPABASE_META_HOST:-0.0.0.0}
      - PG_META_PORT=${SUPABASE_META_CONTAINER_PORT:-8080}
      - PG_META_DB_HOST=${POSTGRES_HOST:-pg-db}
      - PG_META_DB_PORT=${POSTGRES_PORT:-5432}
      - PG_META_DB_NAME=${POSTGRES_DB:-labelstudio}
      - PG_META_DB_USER=${POSTGRES_USER:-labelstudio}
      - PG_META_DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - PG_META_DB_SSL_MODE=${PG_META_DB_SSL_MODE:-disable}
      - PG_META_DB_SSL_ROOT_CERT=${PG_META_DB_SSL_ROOT_CERT:-}
      - PG_CONN_TIMEOUT_SECS=${PG_CONN_TIMEOUT_SECS:-15}
      - PG_QUERY_TIMEOUT_SECS=${PG_QUERY_TIMEOUT_SECS:-55}
      - PG_META_MAX_RESULT_SIZE_MB=${PG_META_MAX_RESULT_SIZE_MB:-2048}
      - PG_META_MAX_BODY_LIMIT_MB=${PG_META_MAX_BODY_LIMIT_MB:-3}
      - PG_META_REQ_HEADER=${PG_META_REQ_HEADER:-request-id}
      - CRYPTO_KEY=${PG_META_CRYPTO_KEY:?PG_META_CRYPTO_KEY is required}
    ports:
      - "${SUPABASE_META_BIND_ADDRESS:-127.0.0.1}:${SUPABASE_META_PORT:-18087}:${SUPABASE_META_CONTAINER_PORT:-8080}"
    depends_on:
      pg-db:
        condition: service_healthy
    networks:
      - internal

  # Optional S3-backed Storage overlay for MinIO integration.
  # Enable via profile `supabase-s3`.
  supabase-storage:
    image: ${SUPABASE_STORAGE_IMAGE:-supabase/storage-api:v1.48.26}
    profiles:
      - supabase-s3
    restart: unless-stopped
    environment:
      - ANON_KEY=${ANON_KEY:-}
      - SERVICE_KEY=${SERVICE_ROLE_KEY:-}
      - POSTGREST_URL=${SUPABASE_STORAGE_POSTGREST_URL:-http://supabase-rest:3000}
      - AUTH_JWT_SECRET=${JWT_SECRET:-}
      - DATABASE_URL=${SUPABASE_STORAGE_DATABASE_URL:-postgres://${POSTGRES_USER:-labelstudio}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-pg-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-labelstudio}}
      - STORAGE_PUBLIC_URL=${SUPABASE_PUBLIC_URL:-http://localhost:18090}
      - REQUEST_ALLOW_X_FORWARDED_PATH=true
      - FILE_SIZE_LIMIT=${SUPABASE_STORAGE_FILE_SIZE_LIMIT:-52428800}
      - STORAGE_BACKEND=${SUPABASE_STORAGE_BACKEND:-s3}
      - GLOBAL_S3_BUCKET=${SUPABASE_STORAGE_BUCKET:-default-bucket}
      - GLOBAL_S3_ENDPOINT=${SUPABASE_STORAGE_S3_ENDPOINT:-http://minio:9000}
      - GLOBAL_S3_PROTOCOL=${SUPABASE_STORAGE_S3_PROTOCOL:-http}
      - GLOBAL_S3_FORCE_PATH_STYLE=${SUPABASE_STORAGE_S3_FORCE_PATH_STYLE:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_LS_ACCESS_ID:?MINIO_LS_ACCESS_ID is required in .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_LS_SECRET_KEY:?MINIO_LS_SECRET_KEY is required in .env}
      - FILE_STORAGE_BACKEND_PATH=/var/lib/storage
      - TENANT_ID=${SUPABASE_STORAGE_TENANT_ID:-label-studio}
      - REGION=${SUPABASE_STORAGE_REGION:-ap-east-1}
      - ENABLE_IMAGE_TRANSFORMATION=${SUPABASE_STORAGE_ENABLE_IMAGE_TRANSFORMATION:-true}
      - IMGPROXY_URL=http://supabase-imgproxy:5001
      - S3_PROTOCOL_ACCESS_KEY_ID=${S3_PROTOCOL_ACCESS_KEY_ID:-}
      - S3_PROTOCOL_ACCESS_KEY_SECRET=${S3_PROTOCOL_ACCESS_KEY_SECRET:-}
    volumes:
      - ./supabase-storage-data:/var/lib/storage
    depends_on:
      pg-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      supabase-imgproxy:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5000/status"
        ]
      timeout: 5s
      interval: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

  supabase-imgproxy:
    image: ${SUPABASE_IMGPROXY_IMAGE:-darthsim/imgproxy:v3.30.1}
    profiles:
      - supabase-s3
    restart: unless-stopped
    volumes:
      - ./supabase-storage-data:/var/lib/storage
    environment:
      - IMGPROXY_BIND=:5001
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/
      - IMGPROXY_USE_ETAG=true
      - IMGPROXY_AUTO_WEBP=${IMGPROXY_AUTO_WEBP:-true}
      - IMGPROXY_MAX_SRC_RESOLUTION=${IMGPROXY_MAX_SRC_RESOLUTION:-16.8}
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      timeout: 5s
      interval: 5s
      retries: 3
    networks:
      - internal

